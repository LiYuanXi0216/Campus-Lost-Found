server:
  port: 8080 # 指定后端服务启动的端口

spring:
  application:
    name: Campus-Lost-Found

  datasource:
    # 数据库连接地址 (注意时区我帮你补全为 Asia/Shanghai)
    url: jdbc:mysql://localhost:3306/campus_lost_found?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver # 告诉Spring Boot使用MySQL的驱动程序

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射（将数据库的 user_id 自动映射为 Java 里的 userId）
    map-underscore-to-camel-case: true
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园失物招领系统 V4.0</title>
    <style>
        /* ================= 基础与布局样式 ================= */
        :root { --primary: #007BFF; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        .hidden { display: none !important; }

        /* 导航栏 */
        .navbar { background: white; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 20px; font-weight: bold; color: var(--primary); }
        .nav-tabs button { background: none; border: none; font-size: 16px; padding: 10px 15px; cursor: pointer; color: #555; margin-right: 5px; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: bold; }
        .nav-auth button { padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; }
        .btn-login { background: var(--primary); color: white; }
        .btn-logout { background: #eee; color: #333; }

        /* 主内容区 */
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .section-view { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 500px; }

        /* 按钮与表单 */
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border-radius: 5px; cursor: pointer; border: none; color: white; font-weight: bold; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        /* 帖子卡片样式 */
        .post-card { border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; gap: 15px; }
        .post-card:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.1); transform: translateY(-2px); }
        .post-img { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; background: #eee; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; color: white; }

        /* 个人中心特殊样式 */
        .profile-header { display: flex; align-items: center; gap: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #eee; }
        .stat-cards { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: var(--bg); padding: 20px; text-align: center; border-radius: 8px; }

        /* 弹窗样式 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-close { float: right; cursor: pointer; font-size: 20px; font-weight: bold; color: #888; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">Campus Lost & Found</div>
    <div class="nav-tabs">
        <button id="tab-home" class="active" onclick="switchTab('home')">首页大厅</button>
        <button id="tab-profile" class="hidden" onclick="switchTab('profile')">个人中心</button>
        <button id="tab-admin" class="hidden" onclick="switchTab('admin')">管理员看板</button>
    </div>
    <div class="nav-auth" id="auth-area"></div>
</nav>

<div class="container">
    <section id="view-home" class="section-view">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h2 style="margin: 0;">📋 信息大厅</h2>
            <button class="btn btn-primary" onclick="checkAuthAndOpenPostModal()">+ 发布新信息</button>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="搜索关键词..." style="margin: 0; flex-grow: 1;">
            <select id="filterType" style="margin: 0; width: 150px;">
                <option value="ALL">全部类型</option>
                <option value="LOST">寻物启事</option>
                <option value="FOUND">招领启事</option>
            </select>
            <button class="btn btn-primary" onclick="loadAllPosts()">搜索</button>
        </div>
        <div id="allPostsContainer">加载中...</div>
    </section>

    <section id="view-profile" class="section-view hidden">
        <div class="profile-header">
            <img id="myAvatar" class="profile-avatar" src="" alt="头像">
            <div>
                <h2 id="myName" style="margin: 0 0 5px 0;">加载中...</h2>
                <p id="myEmail" style="margin: 0; color: #666; font-size: 14px;"></p>
            </div>
        </div>
        <div class="stat-cards">
            <div class="stat-card"><h3>发布总数</h3><h2 id="statPost" style="color: var(--primary);">0</h2></div>
            <div class="stat-card"><h3>我的评论</h3><h2 style="color: #999;">0</h2></div>
            <div class="stat-card"><h3>我的订阅</h3><h2 style="color: #999;">0</h2></div>
        </div>
        <h3>📝 我发布的帖子</h3>
        <div id="myPostsContainer">加载中...</div>
    </section>

    <section id="view-admin" class="section-view hidden">
        <h2>🛡️ 管理员控制台</h2>
        <p>欢迎进入系统后台，迭代二功能开发中...</p>
    </section>
</div>

<div id="authModal" class="modal-overlay hidden">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('authModal')">&times;</span>
        <h2 id="authModalTitle">用户登录</h2>
        <input type="text" id="authUsername" placeholder="账号">
        <input type="password" id="authPassword" placeholder="密码">
        <div id="registerFields" class="hidden">
            <input type="email" id="authEmail" placeholder="邮箱">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="authCode" placeholder="验证码">
                <button class="btn btn-success" style="width: 150px; margin-top: 8px;" onclick="sendCode()">获取验证码</button>
            </div>
            <input type="text" id="authNickname" placeholder="昵称">
        </div>
        <button class="btn btn-primary" id="authActionBtn" onclick="doLogin()">立即登录</button>
        <p style="text-align: center; margin-top: 15px; cursor: pointer; color: var(--primary);" onclick="toggleAuthMode()">切换到注册/登录</p>
    </div>
</div>

<div id="postModal" class="modal-overlay hidden">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('postModal')">&times;</span>
        <h2 id="postModalTitle">发布新信息</h2>
        <input type="hidden" id="editPostId">

        <select id="postType">
            <option value="LOST">寻物启事 (我丢了东西)</option>
            <option value="FOUND">招领启事 (我捡到东西)</option>
        </select>
        <input type="text" id="postTitle" placeholder="标题 (例：食堂丢失饭卡)">

        <label style="font-size: 12px; color: #666; font-weight: bold;">发生日期区间：</label>
        <div style="display: flex; gap: 10px; margin-bottom: 8px;">
            <input type="date" id="postStartDate" title="起始日期">
            <span style="line-height: 40px;">至</span>
            <input type="date" id="postEndDate" title="结束日期">
        </div>
        <input type="text" id="postTimeDesc" placeholder="模糊时间补充 (例：下午课间操 / 昨天晚上)">

        <label style="font-size: 12px; color: #666; font-weight: bold;">发生地点：</label>
        <div style="display: flex; gap: 10px; margin-bottom: 8px;">
            <select id="postBuildingId" style="flex: 1; margin: 0;">
                <option value="">-- 选择附近建筑字典 (可选) --</option>
                <option value="1">图书馆</option>
                <option value="2">西区第一食堂</option>
                <option value="3">教一楼</option>
            </select>
            <input type="hidden" id="postLat">
            <input type="hidden" id="postLng">
            <button class="btn btn-success hidden" id="locationBtn" style="margin: 0; width: auto;" onclick="autoGetLocation()">📍 获取GPS</button>
        </div>
        <input type="text" id="postLocDesc" placeholder="具体位置补充 (例：二楼靠窗桌子)">

        <textarea id="postDesc" rows="3" placeholder="物品详细描述..."></textarea>
        <input type="text" id="postContact" placeholder="联系方式">
        <input type="file" id="postImage" accept="image/*">
        <button class="btn btn-primary" onclick="submitPost()">🚀 保存提交</button>
    </div>
</div>

<div id="detailModal" class="modal-overlay hidden">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('detailModal')">&times;</span>
        <h2 id="detailTitle" style="margin-top: 0;"></h2>
        <img id="detailImg" src="" style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 5px; display: none;">
        <p><strong>类型：</strong><span id="detailType" class="badge"></span></p>
        <p><strong>时间：</strong><span id="detailTime"></span></p>
        <p><strong>地点：</strong><span id="detailLoc"></span></p>
        <p><strong>联系方式：</strong><span id="detailContact" style="color: var(--danger); font-weight: bold;"></span></p>
        <p style="white-space: pre-wrap; background: #f9f9f9; padding: 10px; border-radius: 5px;" id="detailDesc"></p>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080/api';
    let isRegisterMode = false;

    // 前端模拟数据字典 (对应数据库 campus_building 表)
    const BUILDING_DICT = { 1: '图书馆', 2: '西区第一食堂', 3: '教一楼' };

    window.onload = function() {
        updateNavbarAuth();
        loadAllPosts();
        initTypeListener();
    };

    // --- 核心工具 ---
    function getToken() { return localStorage.getItem('token'); }
    function getUser() { return JSON.parse(localStorage.getItem('user')); }
    function getHeaders() { return { 'Content-Type': 'application/json', 'Authorization': getToken() || '' }; }

    function updateNavbarAuth() {
        const authArea = document.getElementById('auth-area');
        const user = getUser();
        if (user && getToken()) {
            authArea.innerHTML = `<span style="margin-right: 15px;">你好, ${user.nickname}</span><button class="btn-logout" onclick="doLogout()">退出登录</button>`;
            document.getElementById('tab-profile').classList.remove('hidden');
            if (user.role === 'ADMIN') document.getElementById('tab-admin').classList.remove('hidden');
        } else {
            authArea.innerHTML = `<button class="btn-login" onclick="openModal('authModal')">登录 / 注册</button>`;
            document.getElementById('tab-profile').classList.add('hidden');
            document.getElementById('tab-admin').classList.add('hidden');
            switchTab('home');
        }
    }

    function switchTab(viewId) {
        document.querySelectorAll('.section-view').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.nav-tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.remove('hidden');
        document.getElementById('tab-' + viewId).classList.add('active');
        if (viewId === 'home') loadAllPosts();
        if (viewId === 'profile') loadMyProfile();
    }

    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    // --- 登录注册模块 ---
    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('authModalTitle').innerText = isRegisterMode ? '账号注册' : '账号登录';
        document.getElementById('authActionBtn').innerText = isRegisterMode ? '立即注册' : '立即登录';
        document.getElementById('authActionBtn').setAttribute('onclick', isRegisterMode ? 'doRegister()' : 'doLogin()');
        document.getElementById('registerFields').classList.toggle('hidden', !isRegisterMode);
    }

    async function doLogin() {
        const payload = { username: document.getElementById('authUsername').value, password: document.getElementById('authPassword').value };
        try {
            const res = await fetch(`${API_BASE}/users/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.data));
                updateNavbarAuth();
                closeModal('authModal');
                alert('登录成功！');
            } else alert(data.message);
        } catch (e) { alert('网络错误'); }
    }

    async function doRegister() {
        const payload = {
            username: document.getElementById('authUsername').value, password: document.getElementById('authPassword').value,
            email: document.getElementById('authEmail').value, code: document.getElementById('authCode').value, nickname: document.getElementById('authNickname').value
        };
        try {
            const res = await fetch(`${API_BASE}/users/register`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.success) { alert('注册成功，请登录！'); toggleAuthMode(); } else alert(data.message);
        } catch (e) { alert('网络错误'); }
    }

    async function sendCode() {
        const email = document.getElementById('authEmail').value;
        if(!email) return alert('请填邮箱');
        const res = await fetch(`${API_BASE}/users/send-code`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email}) });
        alert((await res.json()).message);
    }

    function doLogout() { localStorage.removeItem('token'); localStorage.removeItem('user'); updateNavbarAuth(); }

    // --- 列表与详情展示 (🔥 适配新版结构) ---
    async function loadAllPosts() {
        const type = document.getElementById('filterType').value;
        const keyword = document.getElementById('searchInput').value;
        let url = `${API_BASE}/posts/search?`;
        if (type !== 'ALL') url += `type=${type}&`;
        if (keyword) url += `keyword=${keyword}`;
        try {
            const res = await fetch(url);
            renderPostList(await res.json(), 'allPostsContainer', false);
        } catch (e) { document.getElementById('allPostsContainer').innerText = '加载失败'; }
    }

    // 格式化展示时间
    function formatTimeDisplay(post) {
        let str = post.incidentStartDate || '未知日期';
        if (post.incidentEndDate && post.incidentEndDate !== post.incidentStartDate) str += ` 至 ${post.incidentEndDate}`;
        if (post.incidentTimeDesc) str += ` (${post.incidentTimeDesc})`;
        return str;
    }

    // 格式化展示地点
    function formatLocationDisplay(post) {
        let str = '';
        if (post.buildingId && BUILDING_DICT[post.buildingId]) str += `[${BUILDING_DICT[post.buildingId]}] `;
        str += post.locationDesc || '未填写详细位置';
        return str;
    }

    function renderPostList(posts, containerId, isMyPosts) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!posts || posts.length === 0) return container.innerHTML = '<p style="color:#888; text-align:center;">暂无数据</p>';

        posts.forEach(post => {
            const isLost = post.type === 'LOST';
            const imgSrc = post.imageUrl || 'data:image/gif;base64,R0lGODlhAQABAIAAAMLCwgAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==';

            let actionBtns = isMyPosts ? `
                    <div style="margin-top: 10px; display: flex; gap: 10px;">
                        <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="event.stopPropagation(); deletePost(${post.id})">删除</button>
                    </div>
                ` : '';

            const postJsonStr = encodeURIComponent(JSON.stringify(post));
            container.innerHTML += `
                    <div class="post-card" onclick="showPostDetail('${postJsonStr}')">
                        <img src="${imgSrc}" class="post-img">
                        <div style="flex-grow: 1;">
                            <h3 style="margin: 0 0 8px 0;"><span class="badge" style="background:${isLost?'var(--danger)':'var(--success)'}">${isLost?'寻物':'招领'}</span> ${post.title}</h3>
                            <p style="margin: 5px 0; color: #666; font-size: 14px;">📍 ${formatLocationDisplay(post)}</p>
                            <p style="margin: 5px 0; color: #666; font-size: 14px;">⏰ ${formatTimeDisplay(post)}</p>
                            ${actionBtns}
                        </div>
                    </div>
                `;
        });
    }

    function showPostDetail(encodedPostStr) {
        const post = JSON.parse(decodeURIComponent(encodedPostStr));
        document.getElementById('detailTitle').innerText = post.title;
        const typeBadge = document.getElementById('detailType');
        typeBadge.innerText = post.type === 'LOST' ? '寻物启事' : '招领启事';
        typeBadge.style.background = post.type === 'LOST' ? 'var(--danger)' : 'var(--success)';

        document.getElementById('detailTime').innerText = formatTimeDisplay(post);
        document.getElementById('detailLoc').innerText = formatLocationDisplay(post);
        document.getElementById('detailDesc').innerText = post.description || '无详细描述';
        document.getElementById('detailContact').innerHTML = getToken() ? (post.contact || '未留联系方式') : `<a href="javascript:openModal('authModal')">登录后查看</a>`;

        const imgEl = document.getElementById('detailImg');
        if (post.imageUrl) { imgEl.src = post.imageUrl; imgEl.style.display = 'block'; } else imgEl.style.display = 'none';
        openModal('detailModal');
    }

    // --- 个人中心 ---
    async function loadMyProfile() {
        try {
            const pRes = await fetch(`${API_BASE}/users/profile`, { headers: getHeaders() });
            const pData = await pRes.json();
            if (pData.success) {
                const info = pData.data.userInfo;
                document.getElementById('myAvatar').src = info.avatar;
                document.getElementById('myName').innerText = info.nickname;
                document.getElementById('myEmail').innerText = info.email || '未绑定邮箱';
                document.getElementById('statPost').innerText = pData.data.stats.postCount;
            }
            const lRes = await fetch(`${API_BASE}/posts/my`, { headers: getHeaders() });
            renderPostList(await lRes.json(), 'myPostsContainer', true);
        } catch (e) { alert('加载失败'); }
    }

    async function deletePost(id) {
        if(!confirm('确定删除？')) return;
        const res = await fetch(`${API_BASE}/posts/${id}`, { method: 'DELETE', headers: getHeaders() });
        if ((await res.json()).success) { alert('删除成功'); loadMyProfile(); loadAllPosts(); }
    }

    // --- 发帖相关 (🔥 核心修改：动态显隐GPS按钮与数据组装) ---
    function initTypeListener() {
        document.getElementById('postType').addEventListener('change', function(e) {
            const locBtn = document.getElementById('locationBtn');
            if (e.target.value === 'FOUND') {
                locBtn.classList.remove('hidden');
            } else {
                locBtn.classList.add('hidden');
                document.getElementById('postLat').value = '';
                document.getElementById('postLng').value = '';
            }
        });
    }

    function checkAuthAndOpenPostModal() {
        if (!getToken()) return openModal('authModal');
        document.getElementById('editPostId').value = '';
        // 清空所有新版表单
        ['postTitle', 'postStartDate', 'postEndDate', 'postTimeDesc', 'postBuildingId', 'postLocDesc', 'postLat', 'postLng', 'postDesc', 'postContact', 'postImage'].forEach(id => document.getElementById(id).value = '');
        // 触发一次 change 事件重置定位按钮状态
        document.getElementById('postType').dispatchEvent(new Event('change'));
        openModal('postModal');
    }

    // 自动定位
    function autoGetLocation() {
        const btn = document.getElementById('locationBtn');
        const locInput = document.getElementById('postLocDesc');
        if (!navigator.geolocation) return alert('浏览器不支持定位！');
        btn.innerText = '⏳ 定位中...'; btn.disabled = true;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude; const lng = pos.coords.longitude;
            document.getElementById('postLat').value = lat; document.getElementById('postLng').value = lng;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`, { headers: { 'Accept-Language': 'zh-CN' } });
                const data = await res.json();
                if (data && data.display_name) locInput.value = data.display_name;
            } catch (e) {} finally { btn.innerText = '📍 重新获取'; btn.disabled = false; }
        }, () => { alert('定位失败，请允许权限'); btn.innerText = '📍 获取GPS'; btn.disabled = false; }, { enableHighAccuracy: true, timeout: 10000 });
    }

    // 提交表单
    async function submitPost() {
        let finalImageUrl = "", aiTags = "";
        const fileInput = document.getElementById('postImage');
        if (fileInput.files.length > 0) {
            const formData = new FormData(); formData.append('file', fileInput.files[0]);
            // 注意这里不要加 Content-Type
            const uploadRes = await fetch(`${API_BASE}/files/upload`, { method: 'POST', headers: { 'Authorization': getToken() || '' }, body: formData });
            const uploadData = await uploadRes.json();
            if (uploadData.success) { finalImageUrl = uploadData.imageUrl; aiTags = uploadData.aiTags; }
            else return alert('图片上传失败：' + uploadData.message);
        }

        let description = document.getElementById('postDesc').value;
        if (aiTags) description += '\n' + aiTags;

        // 🔥 按照最新数据库结构封装 JSON 数据
        const postData = {
            type: document.getElementById('postType').value,
            title: document.getElementById('postTitle').value,
            description: description,
            contact: document.getElementById('postContact').value,

            // 新版时间
            incidentStartDate: document.getElementById('postStartDate').value || null,
            incidentEndDate: document.getElementById('postEndDate').value || null,
            incidentTimeDesc: document.getElementById('postTimeDesc').value,

            // 新版地点
            buildingId: document.getElementById('postBuildingId').value || null,
            locationDesc: document.getElementById('postLocDesc').value,
            latitude: document.getElementById('postLat').value ? parseFloat(document.getElementById('postLat').value) : null,
            longitude: document.getElementById('postLng').value ? parseFloat(document.getElementById('postLng').value) : null
        };
        if(finalImageUrl) postData.imageUrl = finalImageUrl;

        try {
            const res = await fetch(`${API_BASE}/posts`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(postData) });
            if (res.ok || (await res.json()).success) {
                alert('发布成功！'); closeModal('postModal'); loadAllPosts();
                if(!document.getElementById('view-profile').classList.contains('hidden')) loadMyProfile();
            } else alert('发布失败');
        } catch (e) { alert('网络请求异常'); }
    }
</script>
</body>
</html>
